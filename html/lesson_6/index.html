<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 6 - Cafe menu</title>
    <link rel="stylesheet" href="style/menu.css">
</head>
<body>
    <!-- Меню кав'ярні за дизайном із завдання -->
    <div class="container">
        <button>Меню</button>

        <h1>Кав'ярня</h1>

        <form action="">
            <input type="text" placeholder="Пошук напою">
        </form>

        <div class="menu-items">
            <div class="menu-position">
                <div class="position-img">☕</div>
                <h4 class="position-title">Кава</h4>
            </div>

            <div class="menu-position">
                <div class="position-img">🍵</div>
                <h4 class="position-title">Чай</h4>
            </div>

            <div class="menu-position">
                <div class="position-img">🍰</div>
                <h4 class="position-title">Десерт</h4>
            </div>
        </div>
    </div>
</body>
</html>
