<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 22 - Hover Buttons</title>
    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <main class="page">
        <section class="hover-board" aria-labelledby="page-title">
            <div class="board-header">
                <p class="eyebrow">CSS animation practice</p>
                <h1 id="page-title">Hover Buttons</h1>
            </div>

            <!-- Окремі класи на кнопках показують різні hover-ефекти з уроку. -->
            <div class="buttons-grid">
                <a class="hover-btn btn-fill" href="#">
                    <span>Fill In</span>
                </a>

                <a class="hover-btn btn-glow" href="#">
                    <span>Glowing</span>
                </a>

                <a class="hover-btn btn-slide" href="#">
                    <span>Slide</span>
                </a>

                <a class="hover-btn btn-raise" href="#">
                    <span>Raise</span>
                </a>

                <a class="hover-btn btn-fill-up" href="#">
                    <span>Fill Up</span>
                </a>

                <a class="hover-btn btn-close" href="#">
                    <span>Close</span>
                </a>

                <a class="hover-btn btn-text-change" href="#">
                    <span class="text-default">Notify Me</span>
                    <span class="text-hover">Thanks</span>
                </a>

                <a class="hover-btn btn-blend blend-square" href="#">
                    <span>Hover Me</span>
                </a>

                <a class="hover-btn btn-zoom" href="#">
                    <span>Zoom</span>
                </a>

                <a class="hover-btn btn-offset" href="#">
                    <span>Offset</span>
                </a>

                <a class="hover-btn btn-arrow" href="#">
                    <span>Explore More</span>
                </a>

                <a class="hover-btn btn-shape" href="#">
                    <span>Explore More</span>
                </a>

                <a class="hover-btn btn-blend blend-circle" href="#">
                    <span>Hover Me</span>
                </a>

                <a class="hover-btn btn-fancy" href="#">
                    <span>Fancy Button</span>
                </a>
            </div>
        </section>
    </main>
</body>
</html>
