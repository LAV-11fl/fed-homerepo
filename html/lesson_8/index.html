<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 8 - Fonts and Normalize</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/normalize.css">
    <link rel="stylesheet" href="style/menu.css">
</head>
<body>
    <!-- Попередня сторінка меню з підключеним шрифтом і normalize.css -->
    <div class="phone">
        <button class="menu-button">☰</button>

        <h1>Menu</h1>

        <form action="">
            <input type="text" placeholder="Search food here">
        </form>

        <div class="categories">
            <div class="category active">
                <div class="category-img"><img src="img/food.png" alt="Food"></div>
                <p>Food</p>
            </div>

            <div class="category">
                <div class="category-img"><img src="img/drinks.png" alt="Drinks"></div>
                <p>Drinks</p>
            </div>

            <div class="category">
                <div class="category-img"><img src="img/dessert.png" alt="Dessert"></div>
                <p>Dessert</p>
            </div>
        </div>

        <h2>Burger</h2>

        <div class="product">
            <div class="product-img"><img src="img/big-mac.png" alt="Big Mac"></div>
            <div class="product-info">
                <h3>Big Mac</h3>
                <p>Rs 240</p>
            </div>
        </div>

        <div class="product">
            <div class="product-img"><img src="img/kfc-double.png" alt="KFC Double"></div>
            <div class="product-info">
                <h3>KFC Double</h3>
                <p>Rs 252</p>
            </div>
        </div>

        <div class="product">
            <div class="product-img"><img src="img/fish-burger.png" alt="Fish Burger"></div>
            <div class="product-info">
                <h3>Fish Burger</h3>
                <p>Rs 220</p>
            </div>
        </div>
    </div>
</body>
</html>
