<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 10 - Float and Overflow</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <main class="page">
        <section class="developers">
            <div class="content">
                <h1><strong>Best Developers</strong> On The Planet</h1>
                <p class="intro">
                    This product integrates with your favorite apps to automate workflows and
                    ensure smooth, productive work days.
                </p>

                <!-- Картки зроблені через float, як у темі уроку. -->
                <div class="cards clearfix">
                    <article class="card">
                        <div class="avatar avatar-dark">DB</div>
                        <h2>Dan Burykin</h2>
                        <p>Vue JS Developer</p>
                        <div class="icons">
                            <span class="icon vue"><img src="img/vue.png" alt="Vue"></span>
                        </div>
                    </article>

                    <article class="card">
                        <div class="avatar avatar-blue">ED</div>
                        <h2>Esi Doda</h2>
                        <p>Software Developer</p>
                        <div class="icons">
                            <span class="icon angular"><img src="img/angular.png" alt="Angular"></span>
                            <span class="icon flutter"><img src="img/flutter.png" alt="Flutter"></span>
                            <span class="icon react"><img src="img/react.png" alt="React"></span>
                        </div>
                    </article>

                    <article class="card">
                        <div class="avatar avatar-pink">AH</div>
                        <h2>Alex Harper</h2>
                        <p>RN Executive</p>
                        <div class="icons">
                            <span class="icon java"><img src="img/java.png" alt="Java"></span>
                            <span class="icon react"><img src="img/react.png" alt="React"></span>
                        </div>
                    </article>

                    <article class="card">
                        <div class="avatar avatar-green">AM</div>
                        <h2>Amarna Miller</h2>
                        <p>Frontend Wizard</p>
                        <div class="icons">
                            <span class="icon html"><img src="img/html.png" alt="HTML5"></span>
                            <span class="icon css"><img src="img/css.png" alt="CSS"></span>
                        </div>
                    </article>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
