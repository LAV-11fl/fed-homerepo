<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 7 - Food menu</title>
    <link rel="stylesheet" href="style/menu.css">
</head>
<body>
    <!-- Простий блок меню за прикладом з уроку -->
    <div class="menu-card">
        <h1>Food Menu</h1>

        <div class="food-item">
            <div class="food-icon">🍕</div>
            <h3>Піца</h3>
            <p>Сир, томати, тісто</p>
            <strong>120 грн</strong>
        </div>

        <div class="food-item">
            <div class="food-icon">🍔</div>
            <h3>Бургер</h3>
            <p>Булка, котлета, салат</p>
            <strong>95 грн</strong>
        </div>

        <div class="food-item">
            <div class="food-icon">🥗</div>
            <h3>Салат</h3>
            <p>Овочі, зелень, соус</p>
            <strong>80 грн</strong>
        </div>
    </div>
</body>
</html>
