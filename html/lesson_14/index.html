<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 14 - Room.us Figma correction</title>
    <link rel="stylesheet" href="style/main.css">
</head>
<body>
    <div class="page">
        <header class="header">
            <a class="logo" href="index.html">Room.us</a>

            <!-- У цьому уроці доробляємо макет після зауваження викладача -->
            <nav class="nav">
                <a class="active" href="index.html">Home</a>
                <a href="#clients">Amenities</a>
                <a href="mailto:info@room.us">Contact Us</a>
            </nav>

            <div class="header-right">
                <a href="#clients">Category</a>
                <form class="search-block" action="https://www.google.com/search" method="get" target="_blank">
                    <input class="search-input" type="search" name="q" placeholder="Search" aria-label="Search">
                </form>
            </div>
        </header>

        <main class="main">
            <div class="photo-block">
                <img src="img/Rectangle168.png" alt="Workspace room">
            </div>

            <section class="text-block">
                <p class="subtitle">Work Space</p>
                <h1>Modern Design work space</h1>
                <p class="description">
                    Lorem ipsum dolor sit amet, consectetur adipiscing elit ut aliquam,
                    purus sit amet luctus venenatis, lectus magna fringilla urna,
                    porttitor rhoncus dolor purus non enim
                </p>

                <a class="video-link" href="https://www.youtube.com/results?search_query=modern+workspace+design" target="_blank" rel="noopener">
                    <span class="play-circle">
                        <img src="img/play-icon.png" alt="Play">
                    </span>
                    <span>Watch Video</span>
                </a>
            </section>

            <div class="decor-column">
                <span class="plus">+</span>
                <div class="side-line"></div>
            </div>

            <div class="social-links">
                <a href="https://twitter.com" target="_blank" rel="noopener">
                    <img class="icon" src="img/twitter.png" alt="Twitter">
                    <img class="icon-hover" src="img/twiter-hover.png" alt="Twitter hover">
                </a>
                <a href="https://instagram.com" target="_blank" rel="noopener">
                    <img class="icon" src="img/instagram.png" alt="Instagram">
                    <img class="icon-hover" src="img/instagram-hover.png" alt="Instagram hover">
                </a>
                <a class="facebook" href="https://facebook.com" target="_blank" rel="noopener">
                    <img class="icon" src="img/facebook.png" alt="Facebook">
                    <img class="icon-hover" src="img/facebook-hover.png" alt="Facebook hover">
                </a>
            </div>
        </main>

        <footer class="clients" id="clients">
            <div class="client-photo photo-one"><img src="img/client-1.png" alt="Client"></div>
            <div class="client-photo photo-two"><img src="img/client-2.png" alt="Client"></div>
            <div class="client-photo photo-three"><img src="img/client-3.png" alt="Client"></div>
            <p class="client-text"><strong>235+</strong> Client</p>
        </footer>
    </div>
</body>
</html>
