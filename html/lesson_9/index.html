<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 9 - Position</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <!-- Композиція за Figma-макетом. Position використовується для розміщення шарів. -->
    <main class="stage">
        <section class="diia-flag">
            <div class="diia-card">
                <img class="diia-vector" src="img/diia-vector.svg" alt="Дія">
                <div class="flag"></div>
            </div>
        </section>

        <section class="speechify-square">
            <div class="square-card">
                <div class="blue-square"></div>
                <img class="glyph-square" src="img/speechify-glyph-square.svg" alt="Speechify glyph">
            </div>
        </section>

        <section class="speechify-circle">
            <div class="circle-frame">
                <div class="circle-symbol">
                    <div class="blue-circle"></div>
                    <img class="glyph-circle" src="img/speechify-glyph-circle.svg" alt="Speechify glyph">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
