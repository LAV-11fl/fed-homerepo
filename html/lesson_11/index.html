<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 11 - Developers Cards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <main>
        <h1><strong>Best Developers</strong> On The Planet</h1>
        <p class="sub-title-text">
            This product integrates with your favorite apps to automate workflows
            and ensure smooth, productive work days.
        </p>

        <!-- Картки розміщені через float, як у прикладі викладача. -->
        <div class="card-row clearfix">
            <article class="user-card">
                <div class="user-photo"><img src="img/avatar-dan.png" alt="Dan Burykin"></div>
                <h2>Dan Burykin</h2>
                <p>Vue.JS Developer</p>
                <div class="skills">
                    <span class="skill-item"><img src="img/icon-vue.png" alt="Vue"></span>
                </div>
            </article>

            <article class="user-card">
                <div class="user-photo"><img src="img/avatar-esi.png" alt="Esi Doda"></div>
                <h2>Esi Doda</h2>
                <p>Software Developer</p>
                <div class="skills">
                    <span class="skill-item"><img src="img/icon-angular.png" alt="Angular"></span>
                    <span class="skill-item"><img src="img/icon-flutter.png" alt="Flutter"></span>
                    <span class="skill-item"><img src="img/icon-react.png" alt="React"></span>
                </div>
            </article>

            <article class="user-card">
                <div class="user-photo"><img src="img/avatar-alex.png" alt="Alex Harper"></div>
                <h2>Alex Harper</h2>
                <p>RN Executive</p>
                <div class="skills">
                    <span class="skill-item"><img src="img/icon-java.png" alt="Java"></span>
                    <span class="skill-item"><img src="img/icon-react.png" alt="React"></span>
                </div>
            </article>

            <article class="user-card">
                <div class="user-photo"><img src="img/avatar-amarna.png" alt="Amarna Miller"></div>
                <h2>Amarna Miller</h2>
                <p>Frontend Wizard</p>
                <div class="skills">
                    <span class="skill-item"><img src="img/icon-html.png" alt="HTML5"></span>
                    <span class="skill-item"><img src="img/icon-css.png" alt="CSS3"></span>
                </div>
            </article>
        </div>
    </main>
</body>
</html>
