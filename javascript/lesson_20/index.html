<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>JavaScript Homework 20</title>
  <style>
    :root {
      --color-one: #f9d5e5;
      --color-two: #d5f9e7;
      --color-three: #d5e5f9;
      --color-four: #fff2b8;
    }

    body {
      font-family: Arial, sans-serif;
    }

    section {
      margin-bottom: 25px;
    }

    button {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <h1>JavaScript Homework 20</h1>

  <section>
    <h2>1. Повідомлення із затримкою</h2>
    <button id="message-button">Показати повідомлення в консолі</button>
    <p id="message-info">Повідомлення з'явиться через 2 секунди.</p>
    <p id="message-result">Тут буде дубль повідомлення зі сторінки.</p>
  </section>

  <section>
    <h2>2. Таймер до 10</h2>
    <button id="timer-button">Запустити таймер</button>
    <p>Лічильник: <span id="counter">0</span></p>
  </section>

  <section>
    <h2>3. Випадковий колір з CSS змінних</h2>
    <button id="color-button">Змінити фон</button>
  </section>

  <script src="main.js"></script>
</body>
</html>
