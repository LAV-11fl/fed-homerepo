<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>JavaScript Homework 17</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    section {
      margin-bottom: 30px;
    }

    input {
      margin: 5px;
    }

    li {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <h1>JavaScript Homework 17</h1>

  <section>
    <h2>1. Конвертер валюти</h2>
    <label>
      Сума:
      <input id="money-amount" type="number" value="100">
    </label>
    <label>
      Курс:
      <input id="money-rate" type="number" value="40">
    </label>
    <button id="convert-button">Конвертувати</button>
    <p id="convert-result">Результат буде тут.</p>
  </section>

  <section>
    <h2>2. Список завдань</h2>
    <input id="task-input" type="text" placeholder="Назва завдання">
    <button id="add-task-button">Додати</button>
    <ul id="task-list"></ul>
  </section>

  <script src="main.js"></script>
</body>
</html>
